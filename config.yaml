# ============================================================
# Smart Traffic System — Central Configuration
# ============================================================

paths:
  video:          "data/test_video.mp4"
  weights:        "weights/yolo11n.pt"
  helmet_weights: null                  # Set path when Phase 2 model is ready
  violations_dir: "data/violations"
  log_csv:        "data/violation_log.csv"

detection:
  confidence:      0.4
  vehicle_classes: [2, 3, 5, 7]        # car, motorcycle, bus, truck (COCO IDs)
                                        # Now actually used by detector.py

speed:
  enabled:          true
  limit_kmh:        60
  pixels_per_meter: 8.0                 # ⚠ CALIBRATE for your camera:
                                        #   measure a known distance in the frame
                                        #   e.g. lane width ~3.5m → count its pixel width
                                        #   pixels_per_meter = pixel_width / 3.5
  fps_override:     null                # null = auto-detect from video

wrong_way:
  enabled:               true
  min_frames_to_confirm: 8

helmet:
  enabled:    false                     # Set true once helmet model is ready
  confidence: 0.5

ocr:
  min_confidence: 0.3                   # Discard OCR reads below this confidence score

performance:
  frame_skip: 2                         # Process every Nth frame (1=all, 2=every other)
                                        # Increase to 3-4 on slow CPU machines

dashboard:
  refresh_seconds: 3

logging:
  level: "INFO"                         # DEBUG = per-frame light readings; INFO = violations only
  file:  "data/system.log"

telegram:
  enabled: true
  bot_token: "8734561456:AAE3o2DSFYIKqpgeoQ8dFKFkVgINjFlhjo8"
  chat_id: "6167292056"